<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - SecureCart</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
<div class="navbar">
    <div class="logo">Secure<span>Cart</span></div>
    <div class="nav-links">
        <a href="home.html">Home</a>
        <a href="products.html">Products</a>
        <a href="orders.html">Orders</a>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<div class="container">
    <h2 class="page-title">My Cart</h2>
    <div id="cart"></div>

    <div id="checkoutBox" class="checkout-box" style="display:none;">
        <h3>Checkout</h3>

        <label for="address">Delivery address</label>
        <textarea id="address" rows="3" placeholder="House no, street, city, pincode"></textarea>

        <label for="paymentMethod">Payment method</label>
        <select id="paymentMethod">
            <option value="COD">Cash on Delivery</option>
            <option value="ONLINE">Online Payment (coming soon)</option>
        </select>

        <div class="cart-total" id="cartTotal"></div>

        <button onclick="placeOrderFromCart()" style="width:100%; margin-top:10px;">Place Order</button>
    </div>
</div>

<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/cart.js"></script>
</body>
</html>
